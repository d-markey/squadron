name: squadron
description: Multithreading and worker thread pool for Dart / Flutter, to offload CPU-bound and heavy I/O tasks to Isolate or Web Worker threads.
version: 7.4.1-wip
repository: https://github.com/d-markey/squadron

environment:
  sdk: ^3.4.0

dependencies:
  cancelation_token: ^1.1.0 
  logger: ^2.1.0 
  web: ^1.1.0
  meta: ^1.11.0
  using: ^1.0.0

dev_dependencies:
  synchronize: ^1.1.1 
  build_runner: ^2.11.1
  build_web_compilers: ^4.4.14
  coverage: ^1.15.0 
  lints: ">=4.0.0 <7.0.0"
  test: ^1.30.0
  path: ^1.9.1 
  yaml: ^3.1.3 

topics:
  - concurrency
  - parallelism
  - isolate
  - multithread
  - web-worker

funding:
  - https://github.com/sponsors/d-markey
  - https://buymeacoffee.com/dmarkey
